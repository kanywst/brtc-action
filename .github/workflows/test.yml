name: Action self-test

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  weak-fails-gate:
    name: Weak password should fail the 1y gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: brtc
        uses: ./
        continue-on-error: true
        with:
          # md5 + 3-char password is essentially instant on rtx-4090, so
          # the gate must trip. Bcrypt with shortpass would actually take
          # ~30 years and silently pass.
          password: abc
          algorithm: md5
          hardware: rtx-4090
          fail-under-time: 1y
          # Pin to main while the released brtc tag predates the
          # YAML-externalized hashrates and the --guesses flag.
          brtc-version: main
      - name: Assert the gate failed
        run: |
          if [[ "${{ steps.brtc.outcome }}" != "failure" ]]; then
            echo "::error::expected failure for md5/abc under 1y, got ${{ steps.brtc.outcome }}"
            exit 1
          fi

  strong-passes-gate:
    name: Long passphrase passes the 1m gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: brtc
        uses: ./
        with:
          password: "Correct-Horse-Battery-Staple-Plus-2026!"
          algorithm: bcrypt
          cost: "12"
          hardware: rtx-4090
          fail-under-time: 1m
          brtc-version: main
      - name: Show outputs
        run: |
          echo "cost-usd=${{ steps.brtc.outputs.cost-usd }}"
          echo "time-to-crack-seconds=${{ steps.brtc.outputs.time-to-crack-seconds }}"
          echo "entropy-bits=${{ steps.brtc.outputs.entropy-bits }}"

  # NOTE: an --guesses self-test is intentionally omitted until the
  # released brtc tag carries the --guesses flag (currently only on the
  # feat/external-guesses-and-memory branch). After the next brtc
  # release, add a job that pipes a known guess count and asserts the
  # cost-usd output is non-zero.
